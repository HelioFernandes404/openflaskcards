version: '3.8'

name: openflaskcards

# Same stack as docker-compose.yaml, but using the published GHCR images
# instead of building locally. Useful for production deploys or anyone who
# just wants to run OpenFlashcards without a Go/Node toolchain.
#
# Usage:
#   docker compose -f docker-compose.ghcr.yaml up -d
#
# Pin a specific version instead of :latest by setting IMAGE_TAG, e.g.:
#   IMAGE_TAG=0.1.0 docker compose -f docker-compose.ghcr.yaml up -d

services:
  db:
    image: postgres:17-alpine
    container_name: openflaskcards-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: openflaskcards-redis
    command: redis-server --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD is required - generate with openssl rand -base64 32}"
    environment:
      REDISCLI_AUTH: "${REDIS_PASSWORD:?REDIS_PASSWORD is required - generate with openssl rand -base64 32}"
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/heliofernandes404/openflashcards-api:${IMAGE_TAG:-latest}
    container_name: openflaskcards-api
    environment:
      PORT: 3030
      DATABASE_URL: ${DATABASE_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      LOG_LEVEL: ${LOG_LEVEL}
      REDIS_TTS_HOST: ${REDIS_TTS_HOST}
      REDIS_TTS_PORT: ${REDIS_TTS_PORT}
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required - generate with openssl rand -base64 32}"
      REDIS_TTS_DB: ${REDIS_TTS_DB}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TTS_PROVIDER: ${TTS_PROVIDER}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${GOOGLE_APPLICATION_CREDENTIALS_JSON}
      TTS_ELEVENLABS_API_KEY: ${TTS_ELEVENLABS_API_KEY}
      TTS_ELEVENLABS_VOICE_ID: ${TTS_ELEVENLABS_VOICE_ID}
      TTS_ELEVENLABS_MODEL_ID: ${TTS_ELEVENLABS_MODEL_ID}
      TTS_ELEVENLABS_STABILITY: ${TTS_ELEVENLABS_STABILITY}
      TTS_ELEVENLABS_SIMILARITY_BOOST: ${TTS_ELEVENLABS_SIMILARITY_BOOST}
      TTS_ELEVENLABS_STYLE: ${TTS_ELEVENLABS_STYLE}
      TTS_ELEVENLABS_USE_SPEAKER_BOOST: ${TTS_ELEVENLABS_USE_SPEAKER_BOOST}
      TTS_ELEVENLABS_SPEED: ${TTS_ELEVENLABS_SPEED}
      TTS_ELEVENLABS_OUTPUT_FORMAT: ${TTS_ELEVENLABS_OUTPUT_FORMAT}
      TTS_PIPER_BASE_URL: ${TTS_PIPER_BASE_URL}
    ports:
      - "3030:3030"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./media:/app/media

  web:
    image: ghcr.io/heliofernandes404/openflashcards-web:${IMAGE_TAG:-latest}
    container_name: openflaskcards-web
    environment:
      # Rendered at container start into runtime-config.js (see
      # apps/web/docker-entrypoint.sh) — no rebuild needed to point the web
      # UI at a different API URL.
      OPENFLASHCARDS_API_URL: ${OPENFLASHCARDS_API_URL:-http://localhost:3030/api/v1}
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
