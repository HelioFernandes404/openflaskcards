name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # apps/api/Makefile's `test` target already runs `go test ./... -short
      # -count=1`. The -short flag skips the integration tests that need a
      # live Postgres/Redis, so this is safe to run without spinning up
      # those services in CI.
      - name: Test
        run: go test ./... -short -count=1

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:unit

      # Vite dev and Vitest don't type-check; only the production build runs
      # tsc, so build here to catch type errors before they reach a release.
      - name: Build
        run: npm run build
